<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A single hash time-locked contract. Alice locks funds with H(s) and timeout T. Before T, Bob can claim by providing the preimage s and the contract releases funds to Bob. After T, Alice can request a refund and the contract returns her funds.</desc>
